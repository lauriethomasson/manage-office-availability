services:
  - type: web
    name: office-availability-consolidator
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    # --timeout 120: gunicorn's own default (30s) kills a worker mid-request
    # for a legitimately slow batch — a source with many distinct addresses
    # hits Nominatim's mandatory 1-req/sec throttle (extraction/geocode.py)
    # on top of the LLM extraction call itself; confirmed a real ~26-second
    # cold run (Crown Estate, ~26 distinct buildings) sits right at the old
    # limit even before counting Render's own network latency.
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: ACCESS_TOKEN
        sync: false
