services:
  - type: web
    name: office-availability-consolidator
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    # --timeout 120: gunicorn's own default (30s) kills a worker mid-request
    # for a legitimately slow batch — a source with many distinct addresses
    # hits Nominatim's mandatory 1-req/sec throttle (extraction/geocode.py)
    # on top of the LLM extraction call itself; confirmed a real ~26-second
    # cold run (Crown Estate, ~26 distinct buildings) sits right at the old
    # limit even before counting Render's own network latency.
    #
    # --max-requests 15 --max-requests-jitter 5: this app runs a single
    # worker (no --workers flag) for the lifetime of the service — PyMuPDF/
    # Pillow/google-genai (confirmed 2026-07: importing google.genai alone
    # costs ~53MB, permanently, the first time either Gemini call site is
    # used in a worker's lifetime — it's a lazy import, so this hits
    # whichever request triggers it first and never goes away after) are
    # native/heavy dependencies that don't reliably return freed memory to
    # the OS, so RSS can ratchet upward across a session's worth of
    # requests even when each individual file is well-behaved on its own.
    # Lowered from an initial 40 after Crown Estate still SIGKILLed post-fix
    # — confirmed processing it in isolation, locally, peaks around 200MB,
    # nowhere near the free tier's 512MB ceiling (see extraction/
    # pdf_images.py's own memory-bounding fix), so either cumulative
    # cross-request growth is worse than a 40-request budget allows for, or
    # Linux's own allocator behavior for these C extensions is meaningfully
    # worse than what local Windows testing can show — recycling more
    # often is a cheap hedge against both. Gunicorn gracefully restarts the
    # worker after this many requests (jittered so a multi-service deploy
    # wouldn't restart every worker in lockstep, though only one worker
    # exists here) — a standard mitigation for this class of memory creep,
    # trading a bit more frequent ~1s worker-startup cost for a tighter
    # cap on accumulated fragmentation.
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120 --max-requests 15 --max-requests-jitter 5
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: ACCESS_TOKEN
        sync: false
